
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Routine Commerciale — Eco Ecolo Énergie</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--green-light:#E1F5EE;--green-mid:#5DCAA5;--green-dark:#0F6E56;
  --amber:#EF9F27;--amber-light:#FAEEDA;--amber-dark:#854F0B;
  --blue:#2196F3;--blue-light:#E3F2FD;--blue-dark:#1A4F82;
  --purple:#7F77DD;--purple-light:#EEEDFE;--purple-dark:#3D2F8A;
  --orange:#FF8C00;--orange-light:#FFF3E0;--orange-dark:#7A3D10;
  --red:#E24B4A;--red-light:#FCEBEB;
  --bg:#F0F4F8;--surface:#fff;--border:#E2E8F0;
  --text:#1E293B;--text2:#64748B;--text3:#94A3B8;
  --radius:14px;--radius-sm:8px;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:12px}
.header-left img{height:36px}
.header-title{font-size:14px;font-weight:700;color:var(--text)}
.header-title span{color:var(--green)}
.clock{font-size:18px;font-weight:800;color:var(--green)}

/* LAYOUT */
.container{max-width:780px;margin:0 auto;padding:24px 20px 60px}

/* DAY HERO */
.day-hero{background:linear-gradient(135deg,var(--green),#2ECC71);border-radius:var(--radius);padding:24px 28px;margin-bottom:20px;color:#fff;display:flex;align-items:center;justify-content:space-between}
.day-hero-left{}
.day-date{font-size:13px;opacity:.8;margin-bottom:4px;text-transform:capitalize}
.day-name{font-size:36px;font-weight:800;line-height:1;margin-bottom:10px}
.joign-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:5px 14px;border-radius:99px;background:rgba(255,255,255,.25);color:#fff;backdrop-filter:blur(4px)}
.joign-dot{width:7px;height:7px;border-radius:50%;background:#fff}
.day-hero-right{font-size:56px;opacity:.3}

.day-hero.amber{background:linear-gradient(135deg,var(--amber),#F59E0B)}
.day-hero.gray{background:linear-gradient(135deg,#94A3B8,#CBD5E1)}

/* NAV */
.nav{display:flex;gap:4px;background:var(--surface);border-radius:var(--radius);padding:6px;margin-bottom:20px;border:1px solid var(--border);overflow-x:auto}
.nav-btn{flex:1;min-width:80px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:var(--text2);background:transparent;border:none;padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-btn:hover{background:var(--green-light);color:var(--green-dark)}
.nav-btn.active{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(29,158,117,.3)}

/* SECTION LABEL */
.section-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* MISSION CARD */
.mission-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:10px;border-left:4px solid var(--green);animation:fadeUp .25s ease both;transition:box-shadow .15s}
.mission-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.mission-card.amber{border-left-color:var(--amber)}
.mission-card.purple{border-left-color:var(--purple)}
.mission-card.orange{border-left-color:var(--orange)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.mission-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.mission-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--bg)}
.mission-check:hover{border-color:var(--green)}
.mission-check.checked{background:var(--green);border-color:var(--green)}
.mission-check.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:800}
.mission-content{flex:1}
.mission-num{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.mission-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.3}
.mission-title.done{text-decoration:line-through;color:var(--text3)}
.mission-desc{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:12px}
.mission-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 12px;border-radius:99px}
.tag-blue{background:var(--blue-light);color:var(--blue-dark)}
.tag-purple{background:var(--purple-light);color:var(--purple-dark)}
.tag-orange{background:var(--orange-light);color:var(--orange-dark)}
.tag-amber{background:var(--amber-light);color:var(--amber-dark)}
.tag-green{background:var(--green-light);color:var(--green-dark)}

/* NOTE BLOCK */
.note-block{background:var(--amber-light);border-left:4px solid var(--amber);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:14px 16px;margin-bottom:10px;font-size:13px;color:var(--amber-dark);line-height:1.65;display:flex;gap:10px;align-items:flex-start}
.note-icon{font-size:16px;flex-shrink:0;margin-top:1px}

/* RULE CARD */
.rule-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:8px;animation:fadeUp .2s ease both}
.rule-card-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rule-card-icon{width:30px;height:30px;border-radius:8px;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.rule-card-title{font-size:14px;font-weight:700;color:var(--text)}
.rule-item{font-size:13px;color:var(--text2);line-height:1.65;padding-left:18px;position:relative;margin-bottom:6px;display:flex;align-items:flex-start;gap:8px}
.rule-item-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:6px}
.rule-item:last-child{margin-bottom:0}

/* WEEKEND */
.weekend{text-align:center;padding:4rem 1rem;animation:fadeUp .3s ease both}
.weekend-emoji{font-size:64px;margin-bottom:16px}
.weekend-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:8px}
.weekend-sub{font-size:14px;color:var(--text2)}

/* PROGRESS */
.progress-bar-wrap{background:var(--green-light);border-radius:99px;height:6px;overflow:hidden;margin-top:12px}
.progress-bar{height:100%;background:linear-gradient(to right,var(--green),#2ECC71);border-radius:99px;transition:width .4s ease}
.progress-label{font-size:11px;color:var(--text2);margin-top:4px;text-align:right}

/* FOOTER */
.footer{margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--border);font-size:12px;color:var(--text3);text-align:center}
</style>
</head>

      <span class="joign-pill"><span class="joign-dot"></span><span id="joign-label"></span></span>
      <div class="progress-bar-wrap" id="progress-wrap" style="display:none;margin-top:12px;width:200px">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progress-label" style="color:rgba(255,255,255,.8)"></div>
    </div>
    <div class="day-hero-right" id="day-emoji">📞</div>
  </div>

  <nav class="nav" id="nav-row"></nav>
  <div id="content"></div>

  <div class="footer">Eco Ecolo Energie · Process Sales Performant 3E</div>
</div>

<script>
const DAYS = [
  {
    name:"Lundi", joign:"high", emoji:"🚀", heroClass:"",
    missions:[
      {num:"Mission principale",title:"Appeler les nouveaux leads",desc:"Lancer la semaine avec de nouveaux potentiels clients. Objectif : qualifier un maximum de nouveaux contacts pour alimenter le pipeline de la semaine.",tag:"tag-blue",tagLabel:"📋 Nouveaux leads",cardClass:""}
    ],
    note:"Une fois la mission principale faite, rappeler ce qui semble prioritaire ou des nouveaux leads supplémentaires."
  },
  {
    name:"Mardi", joign:"high", emoji:"💪", heroClass:"",
    missions:[
      {num:"Mission principale",title:"Recontacter les prospects +5 000 m²",desc:"Focus sur les gros clients. Meilleure journée de joignabilité — réserver les créneaux du matin pour ces appels à fort enjeu.",tag:"tag-orange",tagLabel:"🏭 À recontacter · +5 000 m²",cardClass:"orange"}
    ],
    note:"Une fois la mission principale faite, rappeler ce qui semble prioritaire ou des à recontacter sans filtre de taille."
  },
  {
    name:"Mercredi", joign:"mid", emoji:"⚡", heroClass:"amber",
    missions:[
      {num:"Mission principale",title:"Appeler les nouveaux leads",desc:"Mi-semaine : alimenter le pipeline avec de nouveaux potentiels. Joignabilité moyenne — compenser avec un volume d'appels plus élevé.",tag:"tag-blue",tagLabel:"📋 Nouveaux leads",cardClass:""}
    ],
    note:"Une fois la mission principale faite, rappeler ce qui semble prioritaire ou des nouveaux leads supplémentaires."
  },
  {
    name:"Jeudi", joign:"high", emoji:"🎯", heroClass:"",
    missions:[
      {num:"Mission prioritaire 1",title:"Recontacter les prospects 1 000 à 5 000 m²",desc:"Focus sur les clients moyens. Bonne journée de joignabilité — attaquer ce segment en premier.",tag:"tag-amber",tagLabel:"🏢 À recontacter · 1 000–5 000 m²",cardClass:"amber"},
      {num:"Mission prioritaire 2",title:"Recontacter les prospects -1 000 m²",desc:"Focus sur les petits clients moyens. À traiter après le premier segment.",tag:"tag-purple",tagLabel:"🏬 À recontacter · -1 000 m²",cardClass:"purple"}
    ],
    note:"Une fois les missions faites, rappeler ce qui semble prioritaire ou des à recontacter sans filtre de taille."
  },
  {
    name:"Vendredi", joign:"mid", emoji:"🏁", heroClass:"amber",
    missions:[
      {num:"Mission principale",title:"Appeler les nouveaux leads",desc:"Fin de semaine : préparer le pipeline de la semaine suivante. Poser les rappels agenda pour lundi et valider toutes les notes de la semaine.",tag:"tag-blue",tagLabel:"📋 Nouveaux leads",cardClass:""}
    ],
    note:"Avant de finir : vérifier que tous les rappels de la semaine prochaine sont bien dans l'agenda avec les notes prospect à jour."
  },
  {name:"Samedi",joign:"we",emoji:"🌴",heroClass:"gray",missions:[],note:""},
  {name:"Dimanche",joign:"we",emoji:"☀️",heroClass:"gray",missions:[],note:""}
];

const PERMANENTS = [
  {icon:"💧",title:"Au fil de l'eau",items:["Rappels prospects : tout noter dans l'agenda + se remettre dans les notes avant d'appeler","Validation éligibilité ou intérêt : confirmer et noter dans l'agenda","Prospects lointains : reporter dans Airtable + agenda avec date estimée"]},
  {icon:"📅",title:"2 fois par mois",items:["Prospects avec mail envoyé : faire une relance téléphonique + mail de suivi"]},
  {icon:"🔁",title:"1 fois par mois",items:["Prospects pas joignables depuis 1 mois : retenter le contact"]},
  {icon:"⏳",title:"Long terme",items:["Non intéressé (a déjà un prestataire) : retel 6 mois avant fin contrat","Non intéressé : retel 1 fois par an","Dans tous les cas : reporter dans Airtable + agenda"]}
];

const joignLabels = {high:"⭐ Meilleure joignabilité",mid:"📶 Moyenne joignabilité",we:"🌴 Week-end"};
let currentDay = new Date().getDay();
currentDay = currentDay===0?6:currentDay-1;
let checked = {};

function updateClock(){
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
updateClock(); setInterval(updateClock,1000);

function toggleCheck(dayIdx, mIdx){
  const key = `${dayIdx}-${mIdx}`;
  checked[key] = !checked[key];
  const el = document.getElementById('check-'+key);
  if(el) el.classList.toggle('checked', checked[key]);
  const title = document.getElementById('title-'+key);
  if(title) title.classList.toggle('done', checked[key]);
  updateProgress(dayIdx);
}

function updateProgress(dayIdx){
  const day = DAYS[dayIdx];
  if(!day.missions.length) return;
  const done = day.missions.filter((_,i)=>checked[`${dayIdx}-${i}`]).length;
  const pct = Math.round(done/day.missions.length*100);
  const bar = document.getElementById('progress-bar');
  const lbl = document.getElementById('progress-label');
  const wrap = document.getElementById('progress-wrap');
  if(bar){ bar.style.width=pct+'%'; wrap.style.display='block'; }
  if(lbl){ lbl.textContent = done===day.missions.length && done>0 ? '✅ Toutes les missions complètes !' : `${done}/${day.missions.length} mission${done>1?'s':''} faite${done>1?'s':''}`; }
}

function renderDay(d){
  const day = DAYS[d];
  const now = new Date();
  document.getElementById('day-date').textContent = now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('day-name').textContent = day.name;
  document.getElementById('joign-label').textContent = joignLabels[day.joign];
  document.getElementById('day-emoji').textContent = day.emoji;
  const hero = document.getElementById('day-hero');
  hero.className = 'day-hero '+(day.heroClass||'');
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===d));
  updateProgress(d);

  const content = document.getElementById('content');

  if(day.joign==='we'){
    content.innerHTML=`<div class="weekend"><div class="weekend-emoji">${day.emoji}</div><p class="weekend-title">Pas de prospection aujourd'hui</p><p class="weekend-sub">Profite de ton week-end. Lundi, les nouveaux leads t'attendent. 💪</p></div>`;
    document.getElementById('progress-wrap').style.display='none';
    return;
  }

  let html='<div class="section-label">Missions du jour</div>';
  day.missions.forEach((m,i)=>{
    const key=`${d}-${i}`;
    const isDone = checked[key]||false;
    html+=`<div class="mission-card ${m.cardClass}">
      <div class="mission-head">
        <div class="mission-check ${isDone?'checked':''}" id="check-${key}" onclick="toggleCheck(${d},${i})"></div>
        <div class="mission-content">
          <div class="mission-num">${m.num}</div>
          <div class="mission-title ${isDone?'done':''}" id="title-${key}">${m.title}</div>
          <div class="mission-desc">${m.desc}</div>
          <span class="mission-tag ${m.tag}">${m.tagLabel}</span>
        </div>
      </div>
    </div>`;
  });

  if(day.note) html+=`<div class="note-block"><span class="note-icon">💡</span><span>${day.note}</span></div>`;

  html+='<div class="section-label">Règles permanentes</div>';
  PERMANENTS.forEach((r,ri)=>{
    html+=`<div class="rule-card" style="animation-delay:${ri*.05}s">
      <div class="rule-card-head">
        <div class="rule-card-icon">${r.icon}</div>
        <div class="rule-card-title">${r.title}</div>
      </div>
      ${r.items.map(it=>`<div class="rule-item"><span class="rule-item-dot"></span><span>${it}</span></div>`).join('')}
    </div>`;
  });

  content.innerHTML=html;
}

function buildNav(){
  const nav = document.getElementById('nav-row');
  DAYS.forEach((d,i)=>{
    const btn=document.createElement('button');
    btn.className='nav-btn'+(i===currentDay?' active':'');
    btn.innerHTML=`${d.emoji} ${d.name}`;
    btn.onclick=()=>renderDay(i);
    nav.appendChild(btn);
  });
}

buildNav();
renderDay(currentDay);
</script>
</body>
</html>
